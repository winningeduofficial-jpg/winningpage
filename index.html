<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />

    <title>위닝에듀</title>

    <link
      rel="preload"
      as="image"
      href="/images/winning-logo.png"
      fetchpriority="high"
    />

    <style>
      html,
      body,
      #root {
        margin: 0;
        min-width: 320px;
        min-height: 100%;
        background: #ffffff;
      }

      body {
        font-family:
          Pretendard,
          "Noto Sans KR",
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        overflow-x: hidden;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      #pre-header {
        position: fixed;
        left: 0;
        top: 0;
        z-index: 40;
        width: 100%;
        height: 84px;
        border-bottom: 1px solid rgba(13, 27, 42, 0.1);
        background: #ffffff;
        box-shadow: 0 8px 28px rgba(13, 27, 42, 0.08);
      }

      .pre-header-inner {
        width: 100%;
        max-width: 1500px;
        height: 84px;
        margin: 0 auto;
        padding: 0 32px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
      }

      .pre-logo-link {
        display: flex;
        width: 190px;
        height: 84px;
        align-items: center;
        flex-shrink: 0;
      }

      .pre-logo {
        width: 190px;
        height: 66px;
        object-fit: contain;
        display: block;
      }

      .pre-nav {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 32px;
        color: #0d1b2a;
        font-size: 15px;
        font-weight: 900;
        line-height: 1;
        white-space: nowrap;
      }

      .pre-nav-item {
        position: relative;
        display: flex;
        height: 84px;
        align-items: center;
      }

      .pre-nav-label {
        position: relative;
        display: inline-flex;
        height: 84px;
        align-items: center;
        gap: 4px;
        color: #0d1b2a;
        text-decoration: none;
        cursor: default;
        transition: color 0.18s ease;
      }

      .pre-nav-label::after {
        content: "";
        position: absolute;
        left: 50%;
        bottom: 0;
        width: 40px;
        height: 3px;
        transform: translateX(-50%) scaleX(0);
        transform-origin: center;
        border-radius: 999px;
        background: #b88737;
        transition: transform 0.18s ease;
      }

      .pre-nav-item:hover .pre-nav-label {
        color: #b88737;
      }

      .pre-nav-item:hover .pre-nav-label::after {
        transform: translateX(-50%) scaleX(1);
      }

      .pre-chevron {
        width: 15px;
        height: 15px;
        stroke: currentColor;
        stroke-width: 2.7;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
        transition: transform 0.18s ease;
      }

      .pre-nav-item:hover .pre-chevron {
        transform: rotate(180deg);
      }

      .pre-dropdown-wrap {
        position: absolute;
        left: 50%;
        top: 100%;
        z-index: 45;
        width: 230px;
        transform: translateX(-50%);
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transition:
          opacity 0.16s ease,
          visibility 0.16s ease;
      }

      .pre-nav-item:hover .pre-dropdown-wrap {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
      }

      .pre-dropdown {
        overflow: hidden;
        border: 1px solid #e5e0d6;
        border-top: 0;
        background: #ffffff;
        box-shadow: 0 18px 45px rgba(13, 27, 42, 0.14);
      }

      .pre-dropdown-link {
        display: block;
        padding: 20px 24px;
        border-bottom: 1px solid #eee8da;
        color: #0d1b2a;
        text-align: center;
        text-decoration: none;
        font-size: 16px;
        font-weight: 900;
        line-height: 1.25;
        letter-spacing: -0.04em;
        cursor: default;
        transition:
          color 0.18s ease,
          background-color 0.18s ease;
      }

      .pre-dropdown-link:last-child {
        border-bottom: 0;
      }

      .pre-dropdown-link:hover {
        background: #fff8e8;
        color: #b88737;
      }

      .pre-actions {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 12px;
        width: 306px;
        height: 84px;
        flex-shrink: 0;
      }

      .pre-login {
        display: inline-flex;
        height: 40px;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(13, 27, 42, 0.25);
        border-radius: 12px;
        background: #ffffff;
        padding: 0 24px;
        color: #0d1b2a;
        font-size: 14px;
        font-weight: 900;
        line-height: 1;
        text-decoration: none;
      }

      .pre-signup {
        display: inline-flex;
        height: 40px;
        align-items: center;
        justify-content: center;
        border: 1px solid #0d1b2a;
        border-radius: 12px;
        background: #0d1b2a;
        padding: 0 24px;
        color: #ffffff;
        font-size: 14px;
        font-weight: 900;
        line-height: 1;
        text-decoration: none;
        box-shadow: 0 10px 26px rgba(13, 27, 42, 0.22);
      }

      @media (max-width: 1200px) {
        .pre-nav {
          gap: 24px;
          font-size: 14px;
        }

        .pre-actions {
          width: 250px;
        }

        .pre-login,
        .pre-signup {
          padding: 0 18px;
        }
      }

      @media (max-width: 900px) {
        #pre-header {
          height: 76px;
        }

        .pre-header-inner {
          height: 76px;
          padding: 0 20px;
        }

        .pre-logo-link {
          width: 170px;
          height: 76px;
        }

        .pre-logo {
          width: 170px;
          height: 58px;
        }

        .pre-nav,
        .pre-actions {
          display: none;
        }
      }
    </style>
  </head>

  <body>
    <div id="pre-header" aria-hidden="true">
      <div class="pre-header-inner">
        <div class="pre-logo-link">
          <img
            class="pre-logo"
            src="/images/winning-logo.png"
            alt=""
            width="190"
            height="66"
          />
        </div>

        <nav class="pre-nav">
          <div class="pre-nav-item">
            <span class="pre-nav-label">
              서비스
              <svg class="pre-chevron" viewBox="0 0 24 24" aria-hidden="true">
                <path d="m6 9 6 6 6-6"></path>
              </svg>
            </span>

            <div class="pre-dropdown-wrap">
              <div class="pre-dropdown">
                <span class="pre-dropdown-link">목표관리서비스</span>
                <span class="pre-dropdown-link">AI 수행평가 서비스</span>
                <span class="pre-dropdown-link">세특코치서비스</span>
                <span class="pre-dropdown-link">수시키드</span>
                <span class="pre-dropdown-link">약점관리서비스</span>
                <span class="pre-dropdown-link">특화멘토링</span>
              </div>
            </div>
          </div>

          <div class="pre-nav-item">
            <span class="pre-nav-label">
              합격전략
              <svg class="pre-chevron" viewBox="0 0 24 24" aria-hidden="true">
                <path d="m6 9 6 6 6-6"></path>
              </svg>
            </span>

            <div class="pre-dropdown-wrap">
              <div class="pre-dropdown">
                <span class="pre-dropdown-link">성공사례</span>
                <span class="pre-dropdown-link">교육부시운영지침</span>
                <span class="pre-dropdown-link">관리시스템이란</span>
              </div>
            </div>
          </div>

          <div class="pre-nav-item">
            <span class="pre-nav-label">
              입시정보
              <svg class="pre-chevron" viewBox="0 0 24 24" aria-hidden="true">
                <path d="m6 9 6 6 6-6"></path>
              </svg>
            </span>

            <div class="pre-dropdown-wrap">
              <div class="pre-dropdown">
                <span class="pre-dropdown-link">수시정보</span>
                <span class="pre-dropdown-link">정시정보</span>
                <span class="pre-dropdown-link">논술정보</span>
              </div>
            </div>
          </div>

          <div class="pre-nav-item">
            <span class="pre-nav-label">
              회사소개
              <svg class="pre-chevron" viewBox="0 0 24 24" aria-hidden="true">
                <path d="m6 9 6 6 6-6"></path>
              </svg>
            </span>

            <div class="pre-dropdown-wrap">
              <div class="pre-dropdown">
                <span class="pre-dropdown-link">회사연혁</span>
                <span class="pre-dropdown-link">조직소개</span>
                <span class="pre-dropdown-link">포트폴리오</span>
              </div>
            </div>
          </div>

          <div class="pre-nav-item">
            <span class="pre-nav-label">
              위닝정보
              <svg class="pre-chevron" viewBox="0 0 24 24" aria-hidden="true">
                <path d="m6 9 6 6 6-6"></path>
              </svg>
            </span>

            <div class="pre-dropdown-wrap">
              <div class="pre-dropdown">
                <span class="pre-dropdown-link">공지사항</span>
                <span class="pre-dropdown-link">이용후기</span>
                <span class="pre-dropdown-link">자주하는 질문</span>
              </div>
            </div>
          </div>
        </nav>

        <div class="pre-actions">
          <span class="pre-login">로그인</span>
          <span class="pre-signup">회원가입</span>
        </div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
