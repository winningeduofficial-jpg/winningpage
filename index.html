<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <title>위닝에듀</title>

    <link rel="preload" as="image" href="/images/winning-logo.png" fetchpriority="high" />
    <link rel="preload" as="image" href="/images/banner-1.png" fetchpriority="high" />

    <style>
      html,
      body,
      #root {
        margin: 0;
        min-width: 320px;
        min-height: 100%;
        background: #f8f7f3;
      }

      body {
        font-family: Pretendard, "Noto Sans KR", system-ui, -apple-system,
          BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      #pre-header {
        position: fixed;
        left: 0;
        top: 0;
        z-index: 999999;
        width: 100%;
        height: 84px;
        background: #ffffff;
        border-bottom: 1px solid rgba(13, 27, 42, 0.1);
        box-shadow: 0 8px 28px rgba(13, 27, 42, 0.08);
      }

      .pre-header-inner {
        height: 84px;
        max-width: 1500px;
        margin: 0 auto;
        padding: 0 32px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .pre-logo-wrap {
        height: 84px;
        width: 190px;
        display: flex;
        align-items: center;
      }

      .pre-logo {
        width: 190px;
        height: 66px;
        display: block;
        object-fit: contain;
      }

      .pre-nav {
        display: flex;
        align-items: center;
        gap: 40px;
        color: #0d1b2a;
        font-size: 15px;
        font-weight: 900;
        white-space: nowrap;
      }

      .pre-nav-item {
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }

      .pre-chevron {
        width: 15px;
        height: 15px;
        stroke: currentColor;
        stroke-width: 2.7;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .pre-actions {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .pre-login {
        border: 1px solid rgba(13, 27, 42, 0.25);
        background: #ffffff;
        color: #0d1b2a;
        border-radius: 12px;
        padding: 10px 24px;
        font-size: 14px;
        font-weight: 900;
        line-height: 20px;
      }

      .pre-start {
        background: #0d1b2a;
        color: #ffffff;
        border-radius: 12px;
        padding: 10px 24px;
        font-size: 14px;
        font-weight: 900;
        line-height: 20px;
        box-shadow: 0 10px 26px rgba(13, 27, 42, 0.22);
      }

      @media (max-width: 900px) {
        .pre-header-inner {
          padding: 0 20px;
        }

        .pre-nav,
        .pre-actions {
          display: none;
        }

        .pre-logo-wrap {
          width: 170px;
        }

        .pre-logo {
          width: 170px;
          height: 58px;
        }
      }
    </style>
  </head>

  <body>
    <div id="pre-header" aria-hidden="true">
      <div class="pre-header-inner">
        <div class="pre-logo-wrap">
          <img class="pre-logo" src="/images/winning-logo.png" alt="" />
        </div>

        <div class="pre-nav">
          <span class="pre-nav-item">
            서비스
            <svg class="pre-chevron" viewBox="0 0 24 24">
              <path d="m6 9 6 6 6-6"></path>
            </svg>
          </span>
          <span>학습 분석</span>
          <span>수시 · 대입</span>
          <span>가격</span>
          <span>후기</span>
          <span>이벤트</span>
        </div>

        <div class="pre-actions">
          <div class="pre-login">로그인</div>
          <div class="pre-start">새로 시작하기</div>
        </div>
      </div>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
