<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />

    <title>위닝에듀</title>

    <link
      rel="preload"
      as="image"
      href="/images/winning-logo.png"
      fetchpriority="high"
    />

    <style>
      html,
      body,
      #root {
        margin: 0;
        min-width: 320px;
        min-height: 100%;
        background: #ffffff;
      }

      body {
        font-family:
          Pretendard,
          "Noto Sans KR",
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        overflow-x: hidden;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      #pre-header {
        position: fixed;
        left: 0;
        top: 0;
        z-index: 40;
        width: 100%;
        height: 84px;
        border-bottom: 1px solid rgba(13, 27, 42, 0.1);
        background: #ffffff;
        box-shadow: 0 8px 28px rgba(13, 27, 42, 0.08);
      }

      .pre-header-inner {
        width: 100%;
        max-width: 1500px;
        height: 84px;
        margin: 0 auto;
        padding: 0 32px;
        display: flex;
        align-items: center;
      }

      .pre-logo-link {
        display: flex;
        width: 190px;
        height: 84px;
        align-items: center;
        flex-shrink: 0;
      }

      .pre-logo {
        display: block;
        width: 190px;
        height: 66px;
        object-fit: contain;
      }

      @media (max-width: 900px) {
        #pre-header {
          height: 76px;
        }

        .pre-header-inner {
          height: 76px;
          padding: 0 20px;
        }

        .pre-logo-link {
          width: 170px;
          height: 76px;
        }

        .pre-logo {
          width: 170px;
          height: 58px;
        }
      }
    </style>
  </head>

  <body>
    <div id="pre-header" aria-hidden="true">
      <div class="pre-header-inner">
        <div class="pre-logo-link">
          <img
            class="pre-logo"
            src="/images/winning-logo.png"
            alt=""
            width="190"
            height="66"
          />
        </div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
