<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <title>위닝에듀</title>

    <link rel="preload" as="image" href="/images/winning-logo.png" fetchpriority="high" />
    <link rel="preload" as="image" href="/images/banner-1.png" fetchpriority="high" />

    <style>
      html,
      body,
      #root {
        margin: 0;
        min-width: 320px;
        min-height: 100%;
        background: #f8f7f3;
      }

      body {
        font-family: Pretendard, "Noto Sans KR", system-ui, -apple-system,
          BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      #first-paint {
        position: fixed;
        inset: 0;
        z-index: 999999;
        background: #f8f7f3;
        opacity: 1;
        transition: opacity 180ms ease;
        pointer-events: none;
      }

      #first-paint.is-hide {
        opacity: 0;
      }

      .fp-header {
        height: 84px;
        background: #ffffff;
        border-bottom: 1px solid rgba(13, 27, 42, 0.1);
        box-shadow: 0 8px 28px rgba(13, 27, 42, 0.08);
      }

      .fp-header-inner {
        height: 84px;
        max-width: 1500px;
        margin: 0 auto;
        padding: 0 32px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .fp-logo {
        height: 66px;
        width: auto;
        display: block;
        object-fit: contain;
      }

      .fp-nav {
        display: flex;
        align-items: center;
        gap: 40px;
        color: #0d1b2a;
        font-size: 15px;
        font-weight: 900;
        white-space: nowrap;
      }

      .fp-actions {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .fp-login {
        border: 1px solid rgba(13, 27, 42, 0.25);
        background: #ffffff;
        color: #0d1b2a;
        border-radius: 12px;
        padding: 10px 24px;
        font-size: 14px;
        font-weight: 900;
      }

      .fp-start {
        background: #0d1b2a;
        color: #ffffff;
        border-radius: 12px;
        padding: 11px 24px;
        font-size: 14px;
        font-weight: 900;
        box-shadow: 0 10px 26px rgba(13, 27, 42, 0.22);
      }

      .fp-hero {
        position: relative;
        min-height: 760px;
        overflow: hidden;
        color: #ffffff;
        background:
          linear-gradient(
            90deg,
            rgba(13, 27, 42, 0.94) 0%,
            rgba(13, 27, 42, 0.88) 32%,
            rgba(13, 27, 42, 0.62) 58%,
            rgba(13, 27, 42, 0.18) 100%
          ),
          url("/images/banner-1.png") center center / cover no-repeat,
          #0d1b2a;
      }

      .fp-hero::after {
        content: "";
        position: absolute;
        inset: 0;
        opacity: 0.09;
        background-image:
          linear-gradient(to right, rgba(255, 255, 255, 0.14) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(255, 255, 255, 0.14) 1px, transparent 1px);
        background-size: 86px 86px;
      }

      .fp-hero-inner {
        position: relative;
        z-index: 1;
        max-width: 1500px;
        margin: 0 auto;
        padding: 192px 32px 112px;
      }

      .fp-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 28px;
        border: 1px solid rgba(214, 176, 106, 0.45);
        background: rgba(13, 27, 42, 0.45);
        color: #d6b06a;
        border-radius: 999px;
        padding: 8px 20px;
        font-size: 15px;
        font-weight: 900;
      }

      .fp-title {
        margin: 0;
        max-width: 1080px;
        color: #ffffff;
        font-size: clamp(52px, 4.8vw, 76px);
        line-height: 1.13;
        letter-spacing: -0.045em;
        font-weight: 900;
        word-break: keep-all;
      }

      .fp-title span {
        display: block;
      }

      .fp-title .gold {
        color: #d6b06a;
      }

      .fp-subtitle {
        margin: 32px 0 0;
        max-width: 860px;
        color: rgba(255, 255, 255, 0.92);
        font-size: 21px;
        line-height: 1.75;
        font-weight: 800;
        word-break: keep-all;
      }

      .fp-buttons {
        margin-top: 40px;
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
      }

      .fp-primary,
      .fp-secondary {
        border-radius: 12px;
        padding: 16px 32px;
        font-size: 18px;
        font-weight: 900;
      }

      .fp-primary {
        background: #ffffff;
        color: #0d1b2a;
        box-shadow: 0 18px 42px rgba(0, 0, 0, 0.2);
      }

      .fp-secondary {
        border: 1px solid rgba(255, 255, 255, 0.28);
        background: rgba(255, 255, 255, 0.08);
        color: #ffffff;
      }

      @media (max-width: 900px) {
        .fp-nav {
          display: none;
        }

        .fp-header-inner {
          padding: 0 20px;
        }

        .fp-actions {
          display: none;
        }

        .fp-logo {
          height: 58px;
        }

        .fp-hero-inner {
          padding: 160px 24px 90px;
        }

        .fp-title {
          font-size: 42px;
        }

        .fp-subtitle {
          font-size: 18px;
        }
      }
    </style>
  </head>

  <body>
    <div id="first-paint" aria-hidden="true">
      <div class="fp-header">
        <div class="fp-header-inner">
          <img class="fp-logo" src="/images/winning-logo.png" alt="" />

          <div class="fp-nav">
            <span>서비스</span>
            <span>학습 분석</span>
            <span>수시 · 대입</span>
            <span>가격</span>
            <span>후기</span>
            <span>이벤트</span>
          </div>

          <div class="fp-actions">
            <div class="fp-login">로그인</div>
            <div class="fp-start">새로 시작하기</div>
          </div>
        </div>
      </div>

      <section class="fp-hero">
        <div class="fp-hero-inner">
          <div class="fp-badge">★ 데이터 기반 맞춤 학습 플랫폼</div>

          <h1 class="fp-title">
            <span>데이터가 발견하고,</span>
            <span class="gold">위닝 서포터가 성장을 완성합니다</span>
          </h1>

          <p class="fp-subtitle">
            학생 개인별 학습 분석부터 대입 전략까지, 위닝에듀가 최적의 길을 제시합니다.
          </p>

          <div class="fp-buttons">
            <div class="fp-primary">지금 시작하기 →</div>
            <div class="fp-secondary">서비스 둘러보기 ◎</div>
          </div>
        </div>
      </section>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
