<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <title>위닝에듀</title>

    <link rel="preload" as="image" href="/images/winning-logo.png" />
    <link rel="preload" as="image" href="/images/banner-1.png" />

    <style>
      html,
      body {
        margin: 0;
        min-width: 320px;
        min-height: 100%;
        background: #f8f7f3;
        font-family: Pretendard, "Noto Sans KR", system-ui, -apple-system,
          BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      #root {
        min-height: 100vh;
        background: #f8f7f3;
      }

      #instant-shell {
        position: fixed;
        inset: 0;
        z-index: 9999;
        min-height: 100vh;
        overflow: hidden;
        background: #0d1b2a;
      }

      .instant-header {
        height: 84px;
        background: #ffffff;
        border-bottom: 1px solid rgba(13, 27, 42, 0.1);
        box-shadow: 0 8px 28px rgba(13, 27, 42, 0.08);
      }

      .instant-header-inner {
        height: 84px;
        max-width: 1500px;
        margin: 0 auto;
        padding: 0 32px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .instant-logo {
        height: 66px;
        width: auto;
        object-fit: contain;
        display: block;
      }

      .instant-nav {
        display: flex;
        align-items: center;
        gap: 40px;
        color: #0d1b2a;
        font-size: 15px;
        font-weight: 900;
        white-space: nowrap;
      }

      .instant-actions {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .instant-login {
        border: 1px solid rgba(13, 27, 42, 0.25);
        background: #ffffff;
        color: #0d1b2a;
        border-radius: 12px;
        padding: 10px 24px;
        font-size: 14px;
        font-weight: 900;
      }

      .instant-start {
        background: #0d1b2a;
        color: #ffffff;
        border-radius: 12px;
        padding: 11px 24px;
        font-size: 14px;
        font-weight: 900;
        box-shadow: 0 10px 26px rgba(13, 27, 42, 0.22);
      }

      .instant-hero {
        position: relative;
        min-height: 760px;
        color: #ffffff;
        background:
          linear-gradient(
            90deg,
            rgba(13, 27, 42, 0.94) 0%,
            rgba(13, 27, 42, 0.88) 32%,
            rgba(13, 27, 42, 0.62) 58%,
            rgba(13, 27, 42, 0.18) 100%
          ),
          url("/images/banner-1.png") center / cover no-repeat,
          #0d1b2a;
      }

      .instant-hero::after {
        content: "";
        position: absolute;
        inset: 0;
        opacity: 0.09;
        background-image:
          linear-gradient(to right, rgba(255, 255, 255, 0.14) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(255, 255, 255, 0.14) 1px, transparent 1px);
        background-size: 86px 86px;
      }

      .instant-hero-inner {
        position: relative;
        z-index: 1;
        max-width: 1500px;
        margin: 0 auto;
        padding: 192px 32px 112px;
      }

      .instant-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border: 1px solid rgba(214, 176, 106, 0.45);
        background: rgba(13, 27, 42, 0.45);
        color: #d6b06a;
        border-radius: 999px;
        padding: 8px 20px;
        font-size: 15px;
        font-weight: 900;
        margin-bottom: 28px;
      }

      .instant-title {
        margin: 0;
        max-width: 1080px;
        font-size: clamp(52px, 4.8vw, 76px);
        line-height: 1.13;
        letter-spacing: -0.045em;
        font-weight: 900;
        word-break: keep-all;
      }

      .instant-title span {
        display: block;
      }

      .instant-title .gold {
        color: #d6b06a;
      }

      .instant-subtitle {
        margin: 32px 0 0;
        max-width: 860px;
        color: rgba(255, 255, 255, 0.92);
        font-size: 21px;
        line-height: 1.75;
        font-weight: 800;
        word-break: keep-all;
      }

      .instant-buttons {
        margin-top: 40px;
        display: flex;
        gap: 16px;
      }

      .instant-primary,
      .instant-secondary {
        border-radius: 12px;
        padding: 16px 32px;
        font-size: 18px;
        font-weight: 900;
      }

      .instant-primary {
        background: #ffffff;
        color: #0d1b2a;
      }

      .instant-secondary {
        border: 1px solid rgba(255, 255, 255, 0.28);
        background: rgba(255, 255, 255, 0.08);
        color: #ffffff;
      }

      @media (max-width: 900px) {
        .instant-nav {
          display: none;
        }

        .instant-hero-inner {
          padding-top: 170px;
        }

        .instant-title {
          font-size: 44px;
        }
      }
    </style>
  </head>

  <body>
    <div id="instant-shell" aria-hidden="true">
      <div class="instant-header">
        <div class="instant-header-inner">
          <img class="instant-logo" src="/images/winning-logo.png" alt="" />

          <div class="instant-nav">
            <span>서비스</span>
            <span>학습 분석</span>
            <span>수시 · 대입</span>
            <span>가격</span>
            <span>후기</span>
            <span>이벤트</span>
          </div>

          <div class="instant-actions">
            <div class="instant-login">로그인</div>
            <div class="instant-start">새로 시작하기</div>
          </div>
        </div>
      </div>

      <section class="instant-hero">
        <div class="instant-hero-inner">
          <div class="instant-badge">★ 데이터 기반 맞춤 학습 플랫폼</div>

          <h1 class="instant-title">
            <span>데이터가 발견하고,</span>
            <span class="gold">위닝 서포터가 성장을 완성합니다</span>
          </h1>

          <p class="instant-subtitle">
            학생 개인별 학습 분석부터 대입 전략까지, 위닝에듀가 최적의 길을 제시합니다.
          </p>

          <div class="instant-buttons">
            <div class="instant-primary">지금 시작하기 →</div>
            <div class="instant-secondary">서비스 둘러보기 ◎</div>
          </div>
        </div>
      </section>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
