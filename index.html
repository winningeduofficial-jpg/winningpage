<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <meta
      name="description"
      content="위닝에듀는 학습 분석, 입시 전략, 수행평가, 생활기록부 관리를 연결하는 교육 컨설팅 플랫폼입니다."
    />

    <title>위닝에듀 | 학습 분석과 입시 전략</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      rel="preload"
      as="image"
      href="/images/winning-logo.png"
      fetchpriority="high"
    />
    <link
      rel="preload"
      as="image"
      href="/images/banner-1.png"
      fetchpriority="high"
    />

    <style>
      html,
      body,
      #root {
        margin: 0;
        min-width: 320px;
        min-height: 100%;
        background: #f8f7f3;
      }

      html {
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }

      body {
        font-family: Pretendard, "Noto Sans KR", system-ui, -apple-system,
          BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-synthesis-weight: none;
        overflow-x: hidden;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      #pre-header {
        position: fixed;
        left: 0;
        top: 0;
        z-index: 999999;
        width: 100%;
        height: 84px;
        background: #ffffff;
        border-bottom: 1px solid rgba(13, 27, 42, 0.1);
        box-shadow: 0 8px 28px rgba(13, 27, 42, 0.08);
      }

      .pre-header-inner {
        width: 100%;
        max-width: 1500px;
        height: 84px;
        margin: 0 auto;
        padding: 0 32px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .pre-logo-wrap {
        flex: 0 0 190px;
        width: 190px;
        height: 84px;
        display: flex;
        align-items: center;
      }

      .pre-logo {
        display: block;
        width: 190px;
        height: 66px;
        object-fit: contain;
      }

      .pre-nav {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 40px;
        color: #0d1b2a;
        font-size: 15px;
        font-weight: 900;
        line-height: 1;
        white-space: nowrap;
      }

      .pre-nav span {
        display: inline-flex;
        align-items: center;
        height: 24px;
      }

      .pre-nav-item {
        gap: 4px;
      }

      .pre-chevron {
        width: 15px;
        height: 15px;
        display: block;
        stroke: currentColor;
        stroke-width: 2.7;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .pre-actions {
        display: flex;
        align-items: center;
        gap: 12px;
        flex: 0 0 auto;
      }

      .pre-login,
      .pre-start {
        height: 40px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 12px;
        padding: 0 24px;
        font-size: 14px;
        font-weight: 900;
        line-height: 20px;
        white-space: nowrap;
      }

      .pre-login {
        border: 1px solid rgba(13, 27, 42, 0.25);
        background: #ffffff;
        color: #0d1b2a;
      }

      .pre-start {
        border: 1px solid #0d1b2a;
        background: #0d1b2a;
        color: #ffffff;
        box-shadow: 0 10px 26px rgba(13, 27, 42, 0.22);
      }

      .pre-main {
        min-height: 100vh;
        padding-top: 84px;
        background:
          radial-gradient(circle at top left, rgba(184, 135, 55, 0.16), transparent 34%),
          linear-gradient(135deg, #f8f7f3 0%, #ffffff 42%, #f2ede4 100%);
      }

      .pre-hero {
        width: 100%;
        max-width: 1500px;
        margin: 0 auto;
        padding: 88px 32px 72px;
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(420px, 0.82fr);
        gap: 56px;
        align-items: center;
      }

      .pre-eyebrow {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        border: 1px solid rgba(184, 135, 55, 0.35);
        background: rgba(255, 255, 255, 0.72);
        padding: 9px 16px;
        color: #8a6427;
        font-size: 14px;
        font-weight: 900;
        letter-spacing: -0.02em;
      }

      .pre-title {
        margin: 24px 0 18px;
        color: #0d1b2a;
        font-size: clamp(42px, 5vw, 76px);
        font-weight: 950;
        line-height: 1.06;
        letter-spacing: -0.06em;
      }

      .pre-title strong {
        color: #b88737;
        font-weight: 950;
      }

      .pre-desc {
        max-width: 620px;
        margin: 0;
        color: rgba(13, 27, 42, 0.72);
        font-size: 19px;
        font-weight: 700;
        line-height: 1.72;
        letter-spacing: -0.03em;
      }

      .pre-hero-actions {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-top: 34px;
      }

      .pre-primary,
      .pre-secondary {
        height: 52px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 16px;
        padding: 0 26px;
        font-size: 15px;
        font-weight: 950;
        text-decoration: none;
        white-space: nowrap;
      }

      .pre-primary {
        border: 1px solid #0d1b2a;
        background: #0d1b2a;
        color: #ffffff;
        box-shadow: 0 16px 36px rgba(13, 27, 42, 0.22);
      }

      .pre-secondary {
        border: 1px solid rgba(13, 27, 42, 0.18);
        background: rgba(255, 255, 255, 0.72);
        color: #0d1b2a;
      }

      .pre-visual {
        min-height: 420px;
        border-radius: 34px;
        background:
          linear-gradient(145deg, rgba(13, 27, 42, 0.96), rgba(22, 42, 64, 0.92)),
          url("/images/banner-1.png") center / cover no-repeat;
        box-shadow: 0 34px 80px rgba(13, 27, 42, 0.24);
        overflow: hidden;
        position: relative;
      }

      .pre-visual::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(135deg, rgba(184, 135, 55, 0.32), transparent 48%),
          radial-gradient(circle at 78% 22%, rgba(255, 255, 255, 0.18), transparent 30%);
      }

      .pre-visual-card {
        position: absolute;
        left: 28px;
        right: 28px;
        bottom: 28px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: rgba(255, 255, 255, 0.9);
        padding: 22px;
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.16);
      }

      .pre-card-label {
        margin: 0 0 8px;
        color: #b88737;
        font-size: 13px;
        font-weight: 950;
      }

      .pre-card-title {
        margin: 0;
        color: #0d1b2a;
        font-size: 22px;
        font-weight: 950;
        letter-spacing: -0.04em;
      }

      .pre-card-text {
        margin: 8px 0 0;
        color: rgba(13, 27, 42, 0.66);
        font-size: 14px;
        font-weight: 700;
        line-height: 1.6;
      }

      @media (max-width: 1100px) {
        .pre-nav {
          gap: 26px;
        }

        .pre-hero {
          grid-template-columns: 1fr;
        }

        .pre-visual {
          min-height: 360px;
        }
      }

      @media (max-width: 900px) {
        #pre-header {
          height: 76px;
        }

        .pre-header-inner {
          height: 76px;
          padding: 0 20px;
        }

        .pre-logo-wrap {
          flex-basis: 170px;
          width: 170px;
          height: 76px;
        }

        .pre-logo {
          width: 170px;
          height: 58px;
        }

        .pre-nav,
        .pre-actions {
          display: none;
        }

        .pre-main {
          padding-top: 76px;
        }

        .pre-hero {
          padding: 64px 20px 56px;
          gap: 34px;
        }

        .pre-desc {
          font-size: 17px;
        }

        .pre-hero-actions {
          flex-direction: column;
          align-items: stretch;
        }

        .pre-primary,
        .pre-secondary {
          width: 100%;
        }

        .pre-visual {
          min-height: 300px;
          border-radius: 28px;
        }
      }
    </style>
  </head>

  <body>
    <div id="pre-header" aria-hidden="true">
      <div class="pre-header-inner">
        <div class="pre-logo-wrap">
          <img
            class="pre-logo"
            src="/images/winning-logo.png"
            alt=""
            width="190"
            height="66"
          />
        </div>

        <div class="pre-nav">
          <span class="pre-nav-item">
            서비스
            <svg class="pre-chevron" viewBox="0 0 24 24" aria-hidden="true">
              <path d="m6 9 6 6 6-6"></path>
            </svg>
          </span>
          <span>학습 분석</span>
          <span>수시 · 대입</span>
          <span>결제</span>
          <span>후기</span>
          <span>공지사항</span>
        </div>

        <div class="pre-actions">
          <div class="pre-login">로그인</div>
          <div class="pre-start">회원가입</div>
        </div>
      </div>
    </div>

    <div class="pre-main" id="pre-main" aria-hidden="true">
      <section class="pre-hero">
        <div>
          <div class="pre-eyebrow">WINNING EDU STRATEGY PLATFORM</div>

          <h1 class="pre-title">
            공부에도<br />
            <strong>전략이 있습니다.</strong>
          </h1>

          <p class="pre-desc">
            매일의 학습 기록과 입시 데이터를 연결해 학생에게 필요한 방향을
            구체적으로 제시합니다. 학습 분석부터 대입 전략까지, 위닝에듀가
            한 흐름으로 관리합니다.
          </p>

          <div class="pre-hero-actions">
            <a class="pre-primary" href="/signup">무료로 시작하기</a>
            <a class="pre-secondary" href="/services">서비스 살펴보기</a>
          </div>
        </div>

        <div class="pre-visual">
          <div class="pre-visual-card">
            <p class="pre-card-label">TMP 주간 성장 리포트</p>
            <p class="pre-card-title">학습 시간을 기록이 아닌 전략으로 바꿉니다.</p>
            <p class="pre-card-text">
              과목별 비중, 집중 시간대, 목표 대비 변화량을 분석해 다음 주
              학습 방향까지 제안합니다.
            </p>
          </div>
        </div>
      </section>
    </div>

    <div id="root"></div>

    <script>
      window.addEventListener("DOMContentLoaded", function () {
        var root = document.getElementById("root");
        var preMain = document.getElementById("pre-main");

        if (!root || !preMain) return;

        var observer = new MutationObserver(function () {
          if (root.children.length > 0) {
            preMain.remove();
            observer.disconnect();
          }
        });

        observer.observe(root, { childList: true });
      });
    </script>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
