<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />

    <title>위닝에듀</title>

    <link
      rel="preload"
      as="image"
      href="/images/winning-logo.png"
      fetchpriority="high"
    />

    <style>
      html,
      body,
      #root {
        margin: 0;
        min-width: 320px;
        min-height: 100%;
        background: #ffffff;
      }

      body {
        font-family:
          Pretendard,
          "Noto Sans KR",
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        overflow-x: hidden;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      #pre-header {
        position: fixed;
        left: 0;
        top: 0;
        z-index: 40;
        width: 100%;
        height: 84px;
        border-bottom: 1px solid rgba(13, 27, 42, 0.1);
        background: #ffffff;
        box-shadow: 0 8px 28px rgba(13, 27, 42, 0.08);
      }

      .pre-header-inner {
        width: 100%;
        max-width: 1500px;
        height: 84px;
        margin: 0 auto;
        padding: 0 32px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .pre-logo-link {
        display: flex;
        width: 190px;
        height: 84px;
        align-items: center;
        flex-shrink: 0;
      }

      .pre-logo {
        display: block;
        width: 190px;
        height: 66px;
        object-fit: contain;
      }

      .pre-nav {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 32px;
        flex: 1;
        min-width: 0;
        padding: 0 32px;
        color: #0d1b2a;
        font-size: 15px;
        font-weight: 900;
        line-height: 1;
        white-space: nowrap;
      }

      .pre-nav-item {
        display: inline-flex;
        height: 84px;
        align-items: center;
        gap: 4px;
        color: #0d1b2a;
      }

      .pre-chevron {
        width: 15px;
        height: 15px;
        stroke: currentColor;
        stroke-width: 2.7;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .pre-actions {
        display: flex;
        width: 306px;
        height: 84px;
        flex-shrink: 0;
        align-items: center;
        justify-content: flex-end;
        gap: 12px;
      }

      .pre-login,
      .pre-signup {
        display: inline-flex;
        height: 40px;
        align-items: center;
        justify-content: center;
        border-radius: 12px;
        padding: 0 24px;
        font-size: 14px;
        font-weight: 900;
        line-height: 1;
        text-decoration: none;
        white-space: nowrap;
      }

      .pre-login {
        border: 1px solid rgba(13, 27, 42, 0.25);
        background: #ffffff;
        color: #0d1b2a;
      }

      .pre-signup {
        border: 1px solid #0d1b2a;
        background: #0d1b2a;
        color: #ffffff;
        box-shadow: 0 10px 26px rgba(13, 27, 42, 0.22);
      }

      @media (max-width: 1200px) {
        .pre-nav {
          gap: 24px;
          padding: 0 24px;
          font-size: 14px;
        }

        .pre-actions {
          width: 260px;
        }

        .pre-login,
        .pre-signup {
          padding: 0 18px;
        }
      }

      @media (max-width: 900px) {
        #pre-header {
          height: 76px;
        }

        .pre-header-inner {
          height: 76px;
          padding: 0 20px;
        }

        .pre-logo-link {
          width: 170px;
          height: 76px;
        }

        .pre-logo {
          width: 170px;
          height: 58px;
        }

        .pre-nav,
        .pre-actions {
          display: none;
        }
      }
    </style>
  </head>

  <body>
    <div id="pre-header" aria-hidden="true">
      <div class="pre-header-inner">
        <div class="pre-logo-link">
          <img
            class="pre-logo"
            src="/images/winning-logo.png"
            alt=""
            width="190"
            height="66"
          />
        </div>

        <nav class="pre-nav">
          <span class="pre-nav-item">
            서비스
            <svg class="pre-chevron" viewBox="0 0 24 24" aria-hidden="true">
              <path d="m6 9 6 6 6-6"></path>
            </svg>
          </span>

          <span class="pre-nav-item">
            합격전략
            <svg class="pre-chevron" viewBox="0 0 24 24" aria-hidden="true">
              <path d="m6 9 6 6 6-6"></path>
            </svg>
          </span>

          <span class="pre-nav-item">
            입시정보
            <svg class="pre-chevron" viewBox="0 0 24 24" aria-hidden="true">
              <path d="m6 9 6 6 6-6"></path>
            </svg>
          </span>

          <span class="pre-nav-item">
            회사소개
            <svg class="pre-chevron" viewBox="0 0 24 24" aria-hidden="true">
              <path d="m6 9 6 6 6-6"></path>
            </svg>
          </span>

          <span class="pre-nav-item">
            위닝정보
            <svg class="pre-chevron" viewBox="0 0 24 24" aria-hidden="true">
              <path d="m6 9 6 6 6-6"></path>
            </svg>
          </span>
        </nav>

        <div class="pre-actions">
          <span class="pre-login">로그인</span>
          <span class="pre-signup">회원가입</span>
        </div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
